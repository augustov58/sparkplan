              - text: Service Entrance (Utility Source)
            - paragraph [ref=e5475]: Used to label the UTIL→MDP segment on the riser diagram and compute available fault current at the service. All fields optional — fault-current calc falls back to a typical utility transformer estimate when blank.
            - generic [ref=e5476]:
