                - spinbutton [ref=e5479]: "400"
                - paragraph [ref=e5480]: Falls back to MDP main breaker when blank
              - generic [ref=e5481]:
                - generic [ref=e5482]: Available Fault Current (A)
                - spinbutton [ref=e5483]
                - paragraph [ref=e5484]: Utility-supplied (RMS symmetrical). Leave blank for infinite-bus (transformer-limited fault current — IEEE 141 §4.4).
              - generic [ref=e5485]:
                - generic [ref=e5486]: Utility Transformer (kVA)
                - spinbutton [ref=e5487]
                - paragraph [ref=e5488]: Estimated from service amps when blank
              - generic [ref=e5489]:
                - generic [ref=e5490]: Transformer %Z
                - spinbutton [ref=e5491]: "5"
                - paragraph [ref=e5492]: "Typical: 1.5–5.75% by size. Defaults applied when blank."
            - paragraph [ref=e5494]:
              - strong [ref=e5495]: No utility data?
              - text: Leave Available Fault Current blank — the calculator will assume an infinite primary bus and limit fault current by the utility transformer alone. This is the standard early-design approach (IEEE 141 §4.4, IEEE 242) and is accepted by most AHJs. Replace with the utility's actual AFC letter once you have it, especially when claiming series-rated combinations.
            - paragraph [ref=e5496]:
              - strong [ref=e5497]: Service conductors
              - text: (size, length, material, conduit, sets in parallel) are configured in the Feeder Manager — create a feeder marked "Service Entrance" with the MDP as its destination.
