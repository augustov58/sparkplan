            - heading "Service Entrance (Utility Source)" [level=3] [ref=e3856]:
              - img [ref=e3857]
              - text: Service Entrance (Utility Source)
            - paragraph [ref=e3859]: Used to label the UTIL→MDP segment on the riser diagram and compute available fault current at the service. All fields optional — fault-current calc falls back to a typical utility transformer estimate when blank.
            - generic [ref=e3860]:
              - generic [ref=e3861]:
                - generic [ref=e3862]: Service Ampacity
                - spinbutton [ref=e3863]: "400"
                - paragraph [ref=e3864]: Falls back to MDP main breaker when blank
              - generic [ref=e3865]:
                - generic [ref=e3866]: Available Fault Current (A)
                - spinbutton [ref=e3867]
                - paragraph [ref=e3868]: Utility-supplied (RMS symmetrical). Leave blank for infinite-bus (transformer-limited fault current — IEEE 141 §4.4).
              - generic [ref=e3869]:
                - generic [ref=e3870]: Utility Transformer (kVA)
                - spinbutton [ref=e3871]
                - paragraph [ref=e3872]: Estimated from service amps when blank
              - generic [ref=e3873]:
                - generic [ref=e3874]: Transformer %Z
                - spinbutton [ref=e3875]: "5"
                - paragraph [ref=e3876]: "Typical: 1.5–5.75% by size. Defaults applied when blank."
            - paragraph [ref=e3878]:
              - strong [ref=e3879]: No utility data?
              - text: Leave Available Fault Current blank — the calculator will assume an infinite primary bus and limit fault current by the utility transformer alone. This is the standard early-design approach (IEEE 141 §4.4, IEEE 242) and is accepted by most AHJs. Replace with the utility's actual AFC letter once you have it, especially when claiming series-rated combinations.
            - paragraph [ref=e3880]:
              - strong [ref=e3881]: Service conductors
              - text: (size, length, material, conduit, sets in parallel) are configured in the Feeder Manager — create a feeder marked "Service Entrance" with the MDP as its destination.
